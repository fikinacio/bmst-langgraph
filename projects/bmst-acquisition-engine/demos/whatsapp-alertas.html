<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bisca+ — Simulador de Alertas Fiscais por WhatsApp | BMST</title>
  <meta name="description"
    content="Demonstração do sistema automático de alertas de prazos fiscais (IVA, IRT, Imposto Industrial, AGT) que a Bisca+ envia por WhatsApp aos contabilistas." />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:    "#1a4a6b",
            "navy-deep": "#123750",
            teal:    "#2a8a7a",
            accent:  "#c8833a",
            "wa-green":  "#075E54",
            "wa-teal":   "#128C7E",
            "wa-light":  "#25D366",
            "wa-bubble": "#DCF8C6",
            "wa-bg":     "#ECE5DD",
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { background: #0f2433; }
    /* Padrão subtil do fundo de conversa WhatsApp */
    .wa-pattern {
      background-color: #ECE5DD;
      background-image: radial-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    .scroll-thin::-webkit-scrollbar { width: 6px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 3px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useMemo } = React;

    /* ──────────────────────────────────────────────────────────────────────
       Data de referência da demo: 3 de Junho de 2026
       ────────────────────────────────────────────────────────────────────── */
    const HOJE = new Date(2026, 5, 3); // mês 5 = Junho (0-indexed)

    const MESES = [
      "Jan", "Fev", "Mar", "Abr", "Mai", "Jun",
      "Jul", "Ago", "Set", "Out", "Nov", "Dez"
    ];

    function formatarData(d) {
      return `${String(d.getDate()).padStart(2, "0")} ${MESES[d.getMonth()]} ${d.getFullYear()}`;
    }

    function comDias(base, dias) {
      const d = new Date(base);
      d.setDate(d.getDate() + dias);
      return d;
    }

    function diasEntre(de, ate) {
      const MS = 1000 * 60 * 60 * 24;
      const a = new Date(de.getFullYear(), de.getMonth(), de.getDate());
      const b = new Date(ate.getFullYear(), ate.getMonth(), ate.getDate());
      return Math.round((b - a) / MS);
    }

    /* Urgência calculada a partir da data de vencimento vs. hoje */
    function calcularUrgencia(dataVencimento) {
      const dias = diasEntre(HOJE, dataVencimento);
      let nivel, cor, ring, badge, etiqueta;
      if (dias <= 1) {
        nivel = "critico";
        cor = "bg-red-500"; ring = "ring-red-500/30"; badge = "bg-red-100 text-red-700";
        etiqueta = dias <= 0 ? "Vence hoje" : "Vence amanhã";
      } else if (dias <= 7) {
        nivel = "atencao";
        cor = "bg-amber-500"; ring = "ring-amber-500/30"; badge = "bg-amber-100 text-amber-700";
        etiqueta = "Esta semana";
      } else {
        nivel = "ok";
        cor = "bg-emerald-500"; ring = "ring-emerald-500/30"; badge = "bg-emerald-100 text-emerald-700";
        etiqueta = "Em dia";
      }
      return { dias, nivel, cor, ring, badge, etiqueta };
    }

    /* ──────────────────────────────────────────────────────────────────────
       5 clientes mock — prazos fiscais angolanos (IVA, IRT, Imposto Industrial, AGT)
       Datas distribuídas para cobrir vermelho / laranja / verde face a 03 Jun 2026.
       ────────────────────────────────────────────────────────────────────── */
    const clientes = [
      {
        nome: "Comercial Kwanza, Lda.",
        contabilista: "Eng. Domingos Faria",
        prazos: [
          { tipo: "IVA", dataVencimento: comDias(HOJE, 0),
            accao: "Submeter declaração periódica de IVA no portal da AGT." },
        ],
      },
      {
        nome: "Construções Talatona, S.A.",
        contabilista: "Dra. Helena Bumba",
        prazos: [
          { tipo: "IRT", dataVencimento: comDias(HOJE, 0),
            accao: "Entregar retenção de IRT dos salários de Maio." },
          { tipo: "Imposto Industrial", dataVencimento: comDias(HOJE, 12),
            accao: "Preparar pagamento provisório (Modelo 1)." },
        ],
      },
      {
        nome: "Farmácia Saúde Luanda",
        contabilista: "Sr. Adérito Cabral",
        prazos: [
          { tipo: "AGT", dataVencimento: comDias(HOJE, 1),
            accao: "Entregar mapa de fornecedores e clientes à AGT." },
        ],
      },
      {
        nome: "TransLogística Benguela, Lda.",
        contabilista: "Dra. Mariana Sousa",
        prazos: [
          { tipo: "IVA", dataVencimento: comDias(HOJE, 4),
            accao: "Conferir facturas de Maio antes da submissão do IVA." },
        ],
      },
      {
        nome: "Hotel Mar Azul Namibe",
        contabilista: "Eng. Paulo Quissanga",
        prazos: [
          { tipo: "Imposto Industrial", dataVencimento: comDias(HOJE, 21),
            accao: "Reunir documentos para a declaração anual." },
          { tipo: "IRT", dataVencimento: comDias(HOJE, 6),
            accao: "Validar tabela de IRT actualizada para o pessoal sazonal." },
        ],
      },
    ];

    /* Lista plana de prazos (cliente + prazo + urgência) ordenada por urgência */
    function listaPrazosOrdenada() {
      const itens = [];
      clientes.forEach((c) => {
        c.prazos.forEach((p) => {
          itens.push({
            cliente: c.nome,
            contabilista: c.contabilista,
            tipo: p.tipo,
            accao: p.accao,
            dataVencimento: p.dataVencimento,
            urgencia: calcularUrgencia(p.dataVencimento),
          });
        });
      });
      return itens.sort((a, b) => a.urgencia.dias - b.urgencia.dias);
    }

    /* Formato exacto da mensagem de alerta */
    function formatarAlerta(cliente, tipo, dias, dataVencimento, accao) {
      const quando = dias <= 0 ? "hoje" : dias === 1 ? "amanhã" : `em ${dias} dias`;
      return (
        `🔔 Alerta Fiscal — ${cliente}\n` +
        `Prazo: ${tipo} vence ${quando} (${formatarData(dataVencimento)})\n` +
        `Acção necessária: ${accao}\n` +
        `— Sistema Bisca+`
      );
    }

    function horaAgora(d = new Date()) {
      return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
    }

    /* 3 mensagens pré-carregadas — enviadas "ontem" (02 Jun 2026) */
    const mensagensIniciais = [
      {
        id: "pre-1",
        texto: formatarAlerta(
          "Comercial Kwanza, Lda.", "IVA", 1, comDias(HOJE, 0),
          "Submeter declaração periódica de IVA no portal da AGT."
        ),
        hora: "08:30",
        dia: "Ontem",
        montada: true,
      },
      {
        id: "pre-2",
        texto: formatarAlerta(
          "Farmácia Saúde Luanda", "AGT", 2, comDias(HOJE, 1),
          "Entregar mapa de fornecedores e clientes à AGT."
        ),
        hora: "08:31",
        dia: "Ontem",
        montada: true,
      },
      {
        id: "pre-3",
        texto: formatarAlerta(
          "TransLogística Benguela, Lda.", "IVA", 5, comDias(HOJE, 4),
          "Conferir facturas de Maio antes da submissão do IVA."
        ),
        hora: "08:31",
        dia: "Ontem",
        montada: true,
      },
    ];

    /* ──────────────────────────────────────────────────────────────────────
       Componentes de UI
       ────────────────────────────────────────────────────────────────────── */

    function ItemPrazo({ item }) {
      const u = item.urgencia;
      return (
        <div className={`flex items-start gap-3 rounded-xl bg-white/5 p-3 ring-1 ${u.ring} backdrop-blur-sm transition hover:bg-white/10`}>
          <span className={`mt-1 h-3 w-3 shrink-0 rounded-full ${u.cor} ${u.nivel === "critico" ? "animate-pulse" : ""}`}></span>
          <div className="min-w-0 flex-1">
            <div className="flex items-center justify-between gap-2">
              <p className="truncate text-sm font-semibold text-white">{item.cliente}</p>
              <span className={`shrink-0 rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide ${u.badge}`}>
                {u.etiqueta}
              </span>
            </div>
            <p className="mt-0.5 text-xs text-teal-100/80">
              <span className="font-semibold text-white">{item.tipo}</span>
              {" · "}
              {u.dias <= 0 ? "vence hoje" : u.dias === 1 ? "vence amanhã" : `vence em ${u.dias} dias`}
              {" "}({formatarData(item.dataVencimento)})
            </p>
            <p className="mt-0.5 truncate text-[11px] text-teal-100/50">{item.contabilista}</p>
          </div>
        </div>
      );
    }

    function PainelEsquerdo({ prazos, onSimular, aSimular, alertasHoje }) {
      return (
        <div className="flex h-full flex-col bg-gradient-to-b from-navy via-navy-deep to-[#0d2638] text-white">
          {/* Cabeçalho */}
          <div className="border-b border-white/10 px-5 py-4">
            <div className="flex items-center gap-2.5">
              <div className="flex h-9 w-9 items-center justify-center rounded-lg bg-teal text-base font-black shadow-lg">B+</div>
              <div>
                <h1 className="text-base font-bold leading-tight">Bisca+ — Alertas Fiscais</h1>
                <p className="text-[11px] text-teal-100/70">Automação contabilística · BMST Angola</p>
              </div>
            </div>
            <p className="mt-3 text-xs text-teal-100/60">
              Hoje · <span className="font-semibold text-white">{formatarData(HOJE)}</span>
            </p>
          </div>

          {/* Timeline */}
          <div className="flex items-center justify-between px-5 pt-4 pb-2">
            <h2 className="text-xs font-bold uppercase tracking-wider text-teal-100/70">Prazos por urgência</h2>
            <div className="flex items-center gap-2 text-[10px] text-teal-100/60">
              <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-red-500"></span>Hoje</span>
              <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-amber-500"></span>Semana</span>
              <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-emerald-500"></span>Em dia</span>
            </div>
          </div>

          <div className="scroll-thin flex-1 space-y-2 overflow-y-auto px-5 pb-4">
            {prazos.map((item, i) => <ItemPrazo key={i} item={item} />)}
          </div>

          {/* Botão simular */}
          <div className="border-t border-white/10 bg-black/20 px-5 py-4">
            <button
              onClick={onSimular}
              disabled={aSimular}
              className={`group flex w-full items-center justify-center gap-2 rounded-xl px-4 py-3 text-sm font-bold shadow-lg transition
                ${aSimular
                  ? "cursor-not-allowed bg-accent/40 text-white/60"
                  : "bg-accent text-white hover:bg-accent/90 hover:shadow-accent/40 active:scale-[0.98]"}`}
            >
              {aSimular ? (
                <>
                  <span className="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
                  A enviar alertas…
                </>
              ) : (
                <>
                  <span className="text-base">📣</span>
                  Simular Alertas de Hoje
                  <span className="rounded-full bg-white/20 px-1.5 py-0.5 text-[10px]">{alertasHoje}</span>
                </>
              )}
            </button>
            <p className="mt-2 text-center text-[10px] text-teal-100/50">
              Envia mensagens WhatsApp para os prazos que vencem hoje.
            </p>
            <p className="mt-3 text-center text-[10px]">
              <a href="https://biscaplus.com" className="text-teal-100/30 hover:text-teal-100/60 transition-colors">Bisca+ · BMST Angola · biscaplus.com</a>
            </p>
          </div>
        </div>
      );
    }

    function Bolha({ msg }) {
      return (
        <div
          className={`flex transition-all duration-500 ease-out ${msg.montada ? "translate-y-0 opacity-100" : "translate-y-3 opacity-0"}`}
        >
          <div className="relative max-w-[88%] rounded-lg rounded-tl-none bg-wa-bubble px-3 py-2 shadow-sm">
            <p className="text-[11px] font-bold text-wa-teal">Sistema Bisca+</p>
            <p className="mt-0.5 whitespace-pre-wrap text-[13px] leading-relaxed text-gray-800">{msg.texto}</p>
            <div className="mt-1 flex items-center justify-end gap-1">
              <span className="text-[10px] text-gray-500">{msg.hora}</span>
              <svg viewBox="0 0 16 11" className="h-3 w-3 text-sky-500" fill="currentColor">
                <path d="M11.07.65a.5.5 0 0 0-.71 0L4.6 6.41 2.34 4.16a.5.5 0 1 0-.71.71l2.6 2.6a.5.5 0 0 0 .71 0l6.12-6.11a.5.5 0 0 0 0-.71Z"/>
                <path d="M15.07.65a.5.5 0 0 0-.71 0L8.6 6.41l-.6-.6-.71.7 1 1a.5.5 0 0 0 .71 0l6.12-6.11a.5.5 0 0 0-.05-.75Z"/>
              </svg>
            </div>
          </div>
        </div>
      );
    }

    function PainelDireito({ mensagens, separadores }) {
      const fimRef = useRef(null);
      useEffect(() => {
        if (fimRef.current) fimRef.current.scrollIntoView({ behavior: "smooth" });
      }, [mensagens]);

      // Agrupa por dia para mostrar separadores ("Ontem" / "Hoje")
      const grupos = [];
      let diaActual = null;
      mensagens.forEach((m) => {
        if (m.dia !== diaActual) {
          grupos.push({ tipo: "sep", dia: m.dia, id: "sep-" + m.dia });
          diaActual = m.dia;
        }
        grupos.push({ tipo: "msg", msg: m, id: m.id });
      });

      return (
        <div className="flex h-full flex-col">
          {/* Cabeçalho da conversa */}
          <div className="flex items-center gap-3 bg-wa-green px-4 py-3 text-white shadow-md">
            <div className="flex h-10 w-10 items-center justify-center rounded-full bg-wa-light text-lg font-black shadow">B+</div>
            <div className="flex-1">
              <p className="text-sm font-bold leading-tight">Sistema Bisca+</p>
              <p className="text-[11px] text-emerald-100/90">online · alertas automáticos</p>
            </div>
            <div className="flex gap-4 text-emerald-100/80">
              <span className="text-lg">📞</span>
              <span className="text-lg">⋮</span>
            </div>
          </div>

          {/* Mensagens */}
          <div className="wa-pattern scroll-thin flex-1 space-y-2 overflow-y-auto px-4 py-4">
            <div className="mx-auto mb-2 w-fit rounded-md bg-amber-50/90 px-3 py-1 text-center text-[11px] text-amber-800 shadow-sm">
              🔒 As mensagens são geradas automaticamente pela Bisca+. Demonstração — dados fictícios.
            </div>
            {grupos.map((g) =>
              g.tipo === "sep" ? (
                <div key={g.id} className="flex justify-center py-1">
                  <span className="rounded-md bg-white/80 px-3 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-gray-500 shadow-sm">
                    {g.dia}
                  </span>
                </div>
              ) : (
                <Bolha key={g.id} msg={g.msg} />
              )
            )}
            <div ref={fimRef}></div>
          </div>

          {/* Barra de input (decorativa) */}
          <div className="flex items-center gap-2 bg-[#F0F0F0] px-3 py-2.5">
            <div className="flex-1 rounded-full bg-white px-4 py-2 text-[13px] text-gray-400 shadow-sm">
              Mensagem automática — sem resposta necessária
            </div>
            <div className="flex h-10 w-10 items-center justify-center rounded-full bg-wa-teal text-white shadow">
              <span className="text-base">🎤</span>
            </div>
          </div>
        </div>
      );
    }

    /* ──────────────────────────────────────────────────────────────────────
       App
       ────────────────────────────────────────────────────────────────────── */
    function App() {
      const prazos = useMemo(() => listaPrazosOrdenada(), []);
      const [mensagens, setMensagens] = useState(mensagensIniciais);
      const [aSimular, setASimular] = useState(false);

      // Prazos que vencem hoje (dias <= 0) → geram alertas ao clicar
      const alertasDeHoje = useMemo(
        () => prazos.filter((p) => p.urgencia.dias <= 0),
        [prazos]
      );

      function simular() {
        if (aSimular || alertasDeHoje.length === 0) return;
        setASimular(true);

        alertasDeHoje.forEach((p, i) => {
          setTimeout(() => {
            const id = `sim-${Date.now()}-${i}`;
            const texto = formatarAlerta(
              p.cliente, p.tipo, p.urgencia.dias, p.dataVencimento, p.accao
            );
            // adiciona a bolha (montada=false → anima a entrar)
            setMensagens((prev) => [
              ...prev,
              { id, texto, hora: horaAgora(), dia: "Hoje", montada: false },
            ]);
            // no frame seguinte marca como montada para disparar a transição
            requestAnimationFrame(() =>
              requestAnimationFrame(() =>
                setMensagens((prev) =>
                  prev.map((m) => (m.id === id ? { ...m, montada: true } : m))
                )
              )
            );
            if (i === alertasDeHoje.length - 1) {
              setTimeout(() => setASimular(false), 500);
            }
          }, i * 700);
        });
      }

      return (
        <div className="flex min-h-screen items-center justify-center bg-[#0f2433] p-0 sm:p-6">
          <div className="grid h-screen w-full max-w-6xl grid-cols-1 overflow-hidden bg-white shadow-2xl sm:h-[88vh] sm:rounded-2xl md:grid-cols-[1fr_1.15fr]">
            <PainelEsquerdo
              prazos={prazos}
              onSimular={simular}
              aSimular={aSimular}
              alertasHoje={alertasDeHoje.length}
            />
            <div className="min-h-0 overflow-hidden border-t border-gray-200 md:border-l md:border-t-0">
              <PainelDireito mensagens={mensagens} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
