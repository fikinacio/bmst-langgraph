services:
  bmst-agents:
    build: .
    container_name: bmst-agents
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GOTENBERG_URL=http://gotenberg:3000
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
    networks:
      - bmst-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: bmst-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bmst-net

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: bmst-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - bmst-net

volumes:
  redis-data:

networks:
  bmst-net:
    # external: true quando partilhado com n8n/Evolution no EasyPanel.
    # Para ambiente standalone (sem EasyPanel), comenta a linha abaixo
    # e o Docker cria a rede automaticamente.
    external: true
