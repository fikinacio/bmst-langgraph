name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bmst-social-agents

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          # Stub values — all external calls are mocked in tests
          ANTHROPIC_API_KEY: sk-ant-test-key
          BMST_API_KEY: test-api-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-service-key
          REDIS_URL: redis://localhost:6379
          EVOLUTION_API_URL: http://localhost:8080
          EVOLUTION_API_KEY: test-evo-key
          EVOLUTION_INSTANCE: test-instance
          REVISOR_APPROVER_PHONE: "244900000000"
          TAVILY_API_KEY: tvly-test
          GPTZERO_API_KEY: test-gptzero
          CANVA_API_TOKEN: test-canva
          CANVA_BRAND_KIT_ID: test-brand-kit
          CANVA_TEMPLATE_ID: test-template
          LINKEDIN_CLIENT_ID: test-li-client
          LINKEDIN_CLIENT_SECRET: test-li-secret
          LINKEDIN_ACCESS_TOKEN: test-li-token
          LINKEDIN_ORG_URN: "urn:li:organization:123456"
          INSTAGRAM_ACCESS_TOKEN: test-ig-token
          INSTAGRAM_ACCOUNT_ID: "123456789"
          FACEBOOK_PAGE_ID: "987654321"
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: pytest tests/ -v --tb=short

      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
